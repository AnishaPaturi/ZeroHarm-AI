apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroharm-backend
  labels:
    app: zeroharm-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zeroharm-backend
  template:
    metadata:
      labels:
        app: zeroharm-backend
    spec:
      containers:
      - name: backend
        image: zeroharm-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: zeroharm-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: zeroharm-backend-service
spec:
  selector:
    app: zeroharm-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zeroharm-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zeroharm-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
